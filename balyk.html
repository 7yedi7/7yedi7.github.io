<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive navbar</title>
    <link rel="stylesheet" href="./css/style 2.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dik_duran.css">
    <link rel="stylesheet" href="./css/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/icons.css">
    <link rel="stylesheet" href="./css/input.css">

</head>
<body>
    <div>
        <nav>
            <ul class="sidebar">
                <li onclick=hideSidebar()><span class="phoneNavIcon"><i class="bi bi-x-lg"></i></span></li>
                <li><a href="">Block</a></li>
                <li><a href="">Products</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Forum</a></li>
                <li><span class="phoneNavInput"><input class="inputOfNavbar" type="text" placeholder="Search.."><i class="bi bi-search"></i></span></li>
            </ul>
            <ul>
                <li><span class="logoOfA" href=""><img class="logoOfSeven" src="./7 logos/7 logo svg/7.6.svg" alt=""></span></li>
                <li class="hideOnMobile"><a href="">Biz barada</a></li>
                <li class="hideOnMobile"><a href="">Ählisi</a></li>
                <li class="hideOnMobile"><a href="">Bölümler</a></li>
                <li class="hideOnMobile"><a href="">Goşmaça</a></li>
                <li class="hideOnMobile"><span class="phoneNavInput"><input class="inputOfNavbar" type="text" placeholder="Search.."><i class="bi bi-search"></i></span></li>
                <li class="menu-button" onclick=showSidebar()><span class="phoneNavIcon"><i class="bi bi-list"></i></span></li>
            </ul>
        </nav>
    </div>
    <div class="header">

        <!--Content before waves-->
        <div class="inner-header flex">
        <!--Just the logo.. Don't mind this-->
        
        <h1>Simple CSS Waves</h1>
        </div>
        
        <!--Waves Container-->
        <div>
        <svg class="waves"  
        viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs>
        <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
        </defs>
        <g class="parallax">
        <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(255,255,255,0.7" />
        <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(255,255,255,0.5)" />
        <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(255,255,255,0.3)" />
        <use xlink:href="#gentle-wave" x="48" y="10" fill="#fff" />
        </g>
        </svg>
        </div>
        <!--Waves end-->
        
        </div>
    <script>
        function showSidebar(){
            const sidebar= document.querySelector('.sidebar')
            sidebar.style.display = 'flex';
        }
        function hideSidebar(){
            const sidebar = document.querySelector('.sidebar')
            sidebar.style.display = 'none';
        }
    </script>
</body>
</html>
